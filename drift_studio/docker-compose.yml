services:
  # ========================================
  # Nginx 리버스 프록시 (진입점)
  # ========================================
  nginx:
    image: nginx:alpine
    container_name: analyzer-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - app-network

  # ========================================
  # 통합 Backend (분석 + 워크스페이스 + 필드에이전트)
  # ========================================
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: analyzer-backend
    expose:
      - "8000"
    volumes:
      - ./backend/app:/app/app
      - ./dvc_storage:/app/dvc_storage
      - workspaces_data:/workspaces
      - mlruns_data:/mlruns
    working_dir: /app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      - DDOC_ENABLED=${DDOC_ENABLED:-true}
      - MLFLOW_TRACKING_URI=http://mlflow:5050
      - WORKSPACES_ROOT=/workspaces
      - FIFTYONE_DATABASE_URI=mongodb://fiftyone-mongo:27017
      - FIFTYONE_DEFAULT_DATASET_DIR=/workspaces
    depends_on:
      - redis
      - mlflow
      - fiftyone-mongo
    networks:
      - app-network

  # ========================================
  # Frontend (React)
  # ========================================
  frontend:
    build: ./frontend
    container_name: analyzer-frontend
    expose:
      - "3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    working_dir: /app
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    networks:
      - app-network

  # ========================================
  # Celery Worker (비동기 분석 태스크)
  # ========================================
  redis:
    image: redis:alpine
    networks:
      - app-network

  worker:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: analyzer-worker
    command: celery -A app.services.tasks worker --loglevel=info
    volumes:
      - ./dvc_storage:/app/dvc_storage
      - workspaces_data:/workspaces
      - mlruns_data:/mlruns
    environment:
      - DDOC_ENABLED=${DDOC_ENABLED:-true}
      - MLFLOW_TRACKING_URI=http://mlflow:5050
      - WORKSPACES_ROOT=/workspaces
    depends_on:
      - backend
      - redis
    networks:
      - app-network

  # ========================================
  # MLflow (실험 추적)
  # ========================================
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow-server
    expose:
      - "5050"
    volumes:
      - mlruns_data:/mlruns
    command: mlflow server --host 0.0.0.0 --port 5050 --backend-store-uri sqlite:///mlruns/mlflow.db --default-artifact-root /mlruns
    networks:
      - app-network

  # ========================================
  # FiftyOne MongoDB (데이터셋 시각화)
  # ========================================
  fiftyone-mongo:
    image: mongo:6
    container_name: fiftyone-mongo
    volumes:
      - fiftyone_db:/data/db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  workspaces_data:
  mlruns_data:
  fiftyone_db:
  frontend_node_modules:
